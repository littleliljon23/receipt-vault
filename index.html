<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ReceiptVault" />
  <meta name="theme-color" content="#0F172A" />
  <title>ReceiptVault</title>

  <!-- PWA icons (inline SVG favicon) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #F1F5F9;
      overscroll-behavior: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    input, select, textarea {
      outline: none;
      font-family: inherit;
    }
    button { font-family: inherit; cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    const CATEGORIES = [
      "Meals & Entertainment","Travel","Office Supplies",
      "Software & Subscriptions","Marketing","Professional Services",
      "Utilities","Training & Education","Equipment","Other"
    ];

    const STAGES = { IDLE:"idle", EXTRACTING:"extracting", REVIEW:"review", UPLOADING:"uploading", DONE:"done" };

    // ── Spinner ──────────────────────────────────────────────
    function Spinner({ size = 36 }) {
      return (
        <div style={{
          width: size, height: size, borderRadius: "50%",
          border: `3px solid rgba(59,130,246,0.2)`,
          borderTop: `3px solid #3B82F6`,
          animation: "spin 0.9s linear infinite",
          flexShrink: 0
        }} />
      );
    }

    // ── Field ────────────────────────────────────────────────
    function Field({ label, value, onChange, type = "text" }) {
      return (
        <div style={{ marginBottom: 10 }}>
          <label style={{ display:"block", fontSize:11, fontWeight:700, color:"#64748B",
            letterSpacing:"0.6px", textTransform:"uppercase", marginBottom:5 }}>
            {label}
          </label>
          <input
            type={type}
            value={value || ""}
            onChange={e => onChange(e.target.value)}
            style={{
              width:"100%", background:"rgba(255,255,255,0.07)",
              border:"1px solid rgba(255,255,255,0.12)", borderRadius:9,
              padding:"10px 13px", color:"#F1F5F9", fontSize:14
            }}
          />
        </div>
      );
    }

    // ── UploadRow ────────────────────────────────────────────
    function UploadRow({ icon, label, sub, status }) {
      return (
        <div style={{
          display:"flex", alignItems:"center", gap:14,
          background:"rgba(255,255,255,0.04)", borderRadius:13,
          padding:16, marginBottom:10,
          border:"1px solid rgba(255,255,255,0.07)"
        }}>
          <span style={{ fontSize:26 }}>{icon}</span>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:600, fontSize:14 }}>{label}</div>
            <div style={{ color:"#64748B", fontSize:12, marginTop:2 }}>{sub}</div>
          </div>
          <div>
            {status === "pending" && <Spinner size={22} />}
            {status === "success" && <span style={{ fontSize:22 }}>✅</span>}
            {status === "error"   && <span style={{ fontSize:22 }}>❌</span>}
          </div>
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────
    function App() {
      const [stage, setStage]           = useState(STAGES.IDLE);
      const [preview, setPreview]       = useState(null);
      const [b64, setB64]               = useState(null);
      const [mimeType, setMimeType]     = useState("image/jpeg");
      const [data, setData]             = useState(null);
      const [upStatus, setUpStatus]     = useState({ drive:"pending", wave:"pending" });
      const [history, setHistory]       = useState([]);
      const [tab, setTab]               = useState("scanner");
      const [errMsg, setErrMsg]         = useState("");
      const fileRef   = useRef();
      const camRef    = useRef();

      const reset = () => {
        setStage(STAGES.IDLE); setPreview(null); setB64(null);
        setData(null); setErrMsg("");
        setUpStatus({ drive:"pending", wave:"pending" });
      };

      const readFile = file => new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });

      const handleFile = useCallback(async file => {
        if (!file) return;
        const dataUrl = await readFile(file);
        setPreview(dataUrl);
        setB64(dataUrl.split(",")[1]);
        setMimeType(file.type || "image/jpeg");
        setStage(STAGES.EXTRACTING);

        try {
          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
              model:"claude-sonnet-4-6",
              max_tokens:1000,
              messages:[{
                role:"user",
                content:[
                  { type:"image", source:{ type:"base64", media_type: file.type || "image/jpeg", data: dataUrl.split(",")[1] }},
                  { type:"text", text:`Analyze this receipt and return ONLY valid JSON (no markdown, no backticks):
{
  "vendor": "store name",
  "date": "MM/DD/YYYY",
  "total": "0.00",
  "tax": "0.00",
  "subtotal": "0.00",
  "category": "one of: Meals & Entertainment, Travel, Office Supplies, Software & Subscriptions, Marketing, Professional Services, Utilities, Training & Education, Equipment, Other",
  "paymentMethod": "Cash or Credit Card or Debit Card or Unknown",
  "items": ["item1","item2"],
  "notes": ""
}` }
                ]
              }]
            })
          });
          const json = await resp.json();
          const raw  = json.content?.find(b => b.type==="text")?.text || "{}";
          const clean = raw.replace(/```json|```/g,"").trim();
          setData(JSON.parse(clean));
          setStage(STAGES.REVIEW);
        } catch(e) {
          setErrMsg("Could not read receipt. Please fill in manually.");
          setData({ vendor:"", date: new Date().toLocaleDateString("en-US"),
            total:"0.00", tax:"0.00", subtotal:"0.00",
            category:"Other", paymentMethod:"Unknown", items:[], notes:"" });
          setStage(STAGES.REVIEW);
        }
      }, []);

      // ── Webhook URLs ──────────────────────────────────────
      const DRIVE_WEBHOOK = "https://hooks.zapier.com/hooks/catch/26097803/43s1p3f/";
      const WAVE_WEBHOOK  = "PASTE_WAVE_WEBHOOK_URL_HERE"; // ← add Wave URL when ready

      const handleSave = async () => {
        setStage(STAGES.UPLOADING);
        setUpStatus({ drive:"pending", wave:"pending" });

        const payload = {
          vendor:        data.vendor,
          date:          data.date,
          total:         data.total,
          tax:           data.tax,
          subtotal:      data.subtotal,
          category:      data.category,
          paymentMethod: data.paymentMethod,
          notes:         data.notes,
          items:         (data.items || []).join(", "),
          imageData:     preview,   // base64 image for Google Drive
          fileName:      `Receipt_${data.vendor}_${data.date}_$${data.total}.jpg`.replace(/\//g,"-"),
          timestamp:     new Date().toISOString(),
        };

        // ── Google Drive upload ──
        try {
          await fetch(DRIVE_WEBHOOK, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          setUpStatus(p => ({ ...p, drive:"success" }));
        } catch(e) {
          setUpStatus(p => ({ ...p, drive:"error" }));
        }

        // ── Wave logging ──
        if (WAVE_WEBHOOK !== "PASTE_WAVE_WEBHOOK_URL_HERE") {
          try {
            await fetch(WAVE_WEBHOOK, {
              method: "POST",
              mode: "no-cors",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                vendor:   data.vendor,
                date:     data.date,
                total:    data.total,
                tax:      data.tax,
                category: data.category,
                notes:    data.notes,
              }),
            });
            setUpStatus(p => ({ ...p, wave:"success" }));
          } catch(e) {
            setUpStatus(p => ({ ...p, wave:"error" }));
          }
        } else {
          // Wave not connected yet — mark pending
          setTimeout(() => setUpStatus(p => ({ ...p, wave:"pending" })), 500);
        }

        setHistory(h => [{ id:Date.now(), vendor:data.vendor,
          date:data.date, total:data.total, category:data.category,
          preview }, ...h]);
        setStage(STAGES.DONE);
      };

      const up = (key, val) => setData(p => ({ ...p, [key]:val }));

      const totalSpend = history.reduce((s,r) => s + parseFloat(r.total||0), 0).toFixed(2);

      return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column" }}>

          {/* ── HEADER ── */}
          <div style={{
            background:"rgba(255,255,255,0.04)",
            borderBottom:"1px solid rgba(255,255,255,0.08)",
            padding:"14px 18px",
            position:"sticky", top:0, zIndex:10,
            backdropFilter:"blur(12px)"
          }}>
            <div style={{ maxWidth:560, margin:"0 auto", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:26 }}>🧾</span>
                <div>
                  <div style={{ fontWeight:800, fontSize:17, letterSpacing:"-0.3px" }}>ReceiptVault</div>
                  <div style={{ fontSize:10, color:"#475569", letterSpacing:"0.5px" }}>by MF Improv</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:6 }}>
                {["scanner","history"].map(t => (
                  <button key={t} onClick={() => setTab(t)} style={{
                    padding:"6px 13px", borderRadius:20, fontSize:12, fontWeight:600, border:"none",
                    background: tab===t ? "#3B82F6" : "rgba(255,255,255,0.08)",
                    color: tab===t ? "#fff" : "#94A3B8",
                    transition:"all .2s"
                  }}>
                    {t==="scanner" ? "📷 Scan" : `📋 Log (${history.length})`}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* ── MAIN ── */}
          <div style={{ flex:1, maxWidth:560, margin:"0 auto", width:"100%", padding:"22px 16px 32px" }}>

            {tab === "scanner" ? (
              <>
                {/* IDLE */}
                {stage === STAGES.IDLE && (
                  <div className="fade-in" style={{
                    background:"rgba(255,255,255,0.04)", border:"2px dashed rgba(255,255,255,0.12)",
                    borderRadius:22, padding:"44px 22px", textAlign:"center"
                  }}>
                    <div style={{ fontSize:60, marginBottom:14 }}>📸</div>
                    <h2 style={{ fontSize:22, fontWeight:800, marginBottom:8 }}>Snap a Receipt</h2>
                    <p style={{ color:"#94A3B8", fontSize:14, marginBottom:28, lineHeight:1.6 }}>
                      Claude reads it instantly and saves it to<br/>
                      <span style={{ color:"#60A5FA", fontWeight:600 }}>Google Drive</span> +{" "}
                      <span style={{ color:"#34D399", fontWeight:600 }}>Wave (free bookkeeping)</span>
                    </p>

                    <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap", marginBottom:28 }}>
                      <button onClick={() => camRef.current?.click()} style={{
                        background:"linear-gradient(135deg,#3B82F6,#2563EB)",
                        color:"#fff", border:"none", borderRadius:14,
                        padding:"13px 26px", fontSize:15, fontWeight:700,
                        boxShadow:"0 4px 18px rgba(59,130,246,.45)"
                      }}>📷 Take Photo</button>
                      <button onClick={() => fileRef.current?.click()} style={{
                        background:"rgba(255,255,255,0.09)", color:"#E2E8F0",
                        border:"1px solid rgba(255,255,255,0.13)", borderRadius:14,
                        padding:"13px 22px", fontSize:15, fontWeight:600
                      }}>📁 Upload Image</button>
                    </div>

                    <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
                      {[["📁","Google Drive","#4285F4"],["〰️","Wave Free","#10B981"]].map(([ic,lb,cl]) => (
                        <div key={lb} style={{
                          display:"flex", alignItems:"center", gap:6,
                          padding:"5px 13px", borderRadius:20,
                          border:`1px solid ${cl}40`, fontSize:12, fontWeight:600, color:cl
                        }}>{ic} {lb}</div>
                      ))}
                    </div>

                    <input ref={camRef} type="file" accept="image/*" capture="environment"
                      style={{ display:"none" }} onChange={e => handleFile(e.target.files[0])} />
                    <input ref={fileRef} type="file" accept="image/*"
                      style={{ display:"none" }} onChange={e => handleFile(e.target.files[0])} />
                  </div>
                )}

                {/* EXTRACTING */}
                {stage === STAGES.EXTRACTING && (
                  <div className="fade-in" style={{
                    background:"rgba(255,255,255,0.04)", borderRadius:22, padding:32,
                    textAlign:"center", border:"1px solid rgba(255,255,255,0.08)"
                  }}>
                    {preview && <img src={preview} alt="receipt" style={{
                      width:150, height:110, objectFit:"cover", borderRadius:12,
                      marginBottom:22, border:"1px solid rgba(255,255,255,0.1)"
                    }}/>}
                    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:12, marginBottom:22 }}>
                      <Spinner />
                      <p style={{ color:"#94A3B8", fontSize:15 }}>Claude is reading your receipt…</p>
                    </div>
                    {["Detecting vendor & date","Extracting totals & tax","Auto-categorizing expense"].map((s,i) => (
                      <div key={i} style={{ color:"#475569", fontSize:13, marginBottom:6 }}>● {s}</div>
                    ))}
                  </div>
                )}

                {/* REVIEW */}
                {stage === STAGES.REVIEW && data && (
                  <div className="fade-in" style={{
                    background:"rgba(255,255,255,0.04)", borderRadius:22, padding:22,
                    border:"1px solid rgba(255,255,255,0.08)"
                  }}>
                    <div style={{ display:"flex", gap:14, alignItems:"center", marginBottom:18,
                      paddingBottom:16, borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                      {preview && <img src={preview} alt="r" style={{
                        width:60, height:60, objectFit:"cover", borderRadius:10,
                        border:"1px solid rgba(255,255,255,0.1)" }}/>}
                      <div>
                        <div style={{ fontWeight:700, fontSize:17 }}>Review & Confirm</div>
                        <div style={{ color:"#64748B", fontSize:13, marginTop:3 }}>Edit any field before saving</div>
                      </div>
                    </div>

                    {errMsg && <div style={{
                      background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.2)",
                      borderRadius:10, padding:"10px 14px", color:"#FCA5A5", fontSize:13, marginBottom:14
                    }}>⚠️ {errMsg}</div>}

                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
                      <Field label="Vendor" value={data.vendor} onChange={v => up("vendor",v)} />
                      <Field label="Date" value={data.date} onChange={v => up("date",v)} />
                      <Field label="Total ($)" value={data.total} onChange={v => up("total",v)} />
                      <Field label="Tax ($)" value={data.tax} onChange={v => up("tax",v)} />
                    </div>

                    <div style={{ marginBottom:10 }}>
                      <label style={{ display:"block", fontSize:11, fontWeight:700, color:"#64748B",
                        letterSpacing:"0.6px", textTransform:"uppercase", marginBottom:5 }}>Category</label>
                      <select value={data.category} onChange={e => up("category",e.target.value)} style={{
                        width:"100%", background:"#1E293B",
                        border:"1px solid rgba(255,255,255,0.12)", borderRadius:9,
                        padding:"10px 13px", color:"#F1F5F9", fontSize:14
                      }}>
                        {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                      </select>
                    </div>

                    <Field label="Payment Method" value={data.paymentMethod} onChange={v => up("paymentMethod",v)} />

                    <div style={{ marginBottom:16 }}>
                      <label style={{ display:"block", fontSize:11, fontWeight:700, color:"#64748B",
                        letterSpacing:"0.6px", textTransform:"uppercase", marginBottom:5 }}>Notes</label>
                      <textarea value={data.notes||""} onChange={e => up("notes",e.target.value)}
                        rows={2} placeholder="Add a note…" style={{
                          width:"100%", background:"rgba(255,255,255,0.07)",
                          border:"1px solid rgba(255,255,255,0.12)", borderRadius:9,
                          padding:"10px 13px", color:"#F1F5F9", fontSize:14, resize:"none"
                        }}/>
                    </div>

                    <div style={{
                      background:"rgba(59,130,246,0.1)", border:"1px solid rgba(59,130,246,0.2)",
                      borderRadius:12, padding:"13px 18px", display:"flex",
                      justifyContent:"space-between", alignItems:"center", marginBottom:16
                    }}>
                      <span style={{ fontWeight:600, color:"#94A3B8" }}>Total</span>
                      <span style={{ fontWeight:800, fontSize:22, color:"#60A5FA" }}>${data.total}</span>
                    </div>

                    <div style={{ display:"flex", gap:10 }}>
                      <button onClick={reset} style={{
                        flex:1, background:"transparent", color:"#94A3B8",
                        border:"1px solid rgba(255,255,255,0.1)", borderRadius:12,
                        padding:"12px", fontSize:14, fontWeight:600
                      }}>✕ Cancel</button>
                      <button onClick={handleSave} style={{
                        flex:2, background:"linear-gradient(135deg,#3B82F6,#2563EB)",
                        color:"#fff", border:"none", borderRadius:12,
                        padding:"12px", fontSize:15, fontWeight:700,
                        boxShadow:"0 4px 15px rgba(59,130,246,.4)"
                      }}>✓ Save to Drive + Wave</button>
                    </div>
                  </div>
                )}

                {/* UPLOADING */}
                {stage === STAGES.UPLOADING && (
                  <div className="fade-in" style={{
                    background:"rgba(255,255,255,0.04)", borderRadius:22, padding:32,
                    border:"1px solid rgba(255,255,255,0.08)"
                  }}>
                    <div style={{ fontWeight:700, fontSize:18, marginBottom:24, textAlign:"center" }}>
                      Saving your receipt…
                    </div>
                    <UploadRow icon="📁" label="Google Drive" sub="Receipts / 2026 folder" status={upStatus.drive} />
                    <UploadRow icon="〰️" label="Wave" sub="Logging expense entry" status={upStatus.wave} />
                  </div>
                )}

                {/* DONE */}
                {stage === STAGES.DONE && (
                  <div className="fade-in" style={{
                    background:"rgba(255,255,255,0.04)", borderRadius:22, padding:"40px 24px",
                    textAlign:"center", border:"1px solid rgba(255,255,255,0.08)"
                  }}>
                    <div style={{ fontSize:58, marginBottom:12 }}>✅</div>
                    <h2 style={{ fontSize:22, fontWeight:800, marginBottom:12 }}>Receipt Saved!</h2>
                    <div style={{
                      display:"flex", justifyContent:"space-between",
                      background:"rgba(255,255,255,0.05)", borderRadius:13,
                      padding:"14px 20px", marginBottom:20
                    }}>
                      <span style={{ fontWeight:600, fontSize:16 }}>{data?.vendor || "Receipt"}</span>
                      <span style={{ fontWeight:800, fontSize:18, color:"#60A5FA" }}>${data?.total}</span>
                    </div>
                    <div style={{ display:"flex", gap:10, justifyContent:"center", marginBottom:26, flexWrap:"wrap" }}>
                      {[["📁","Saved to Google Drive"],["〰️","Logged in Wave"]].map(([ic,lb]) => (
                        <div key={lb} style={{
                          display:"flex", alignItems:"center", gap:6,
                          background:"rgba(16,185,129,0.1)", border:"1px solid rgba(16,185,129,0.25)",
                          color:"#34D399", borderRadius:20, padding:"6px 14px", fontSize:13, fontWeight:600
                        }}>{ic} {lb}</div>
                      ))}
                    </div>
                    <button onClick={reset} style={{
                      background:"linear-gradient(135deg,#3B82F6,#2563EB)",
                      color:"#fff", border:"none", borderRadius:14,
                      padding:"13px 28px", fontSize:15, fontWeight:700,
                      boxShadow:"0 4px 15px rgba(59,130,246,.4)"
                    }}>+ Scan Another Receipt</button>
                  </div>
                )}
              </>
            ) : (
              /* ── HISTORY TAB ── */
              <div className="fade-in">
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <h2 style={{ fontSize:20, fontWeight:800 }}>Receipt Log</h2>
                  {history.length > 0 && (
                    <span style={{ fontWeight:700, color:"#60A5FA", fontSize:16 }}>
                      Total: ${totalSpend}
                    </span>
                  )}
                </div>

                {history.length === 0 ? (
                  <div style={{ textAlign:"center", padding:"60px 20px" }}>
                    <div style={{ fontSize:48, marginBottom:12 }}>🧾</div>
                    <p style={{ color:"#64748B", marginBottom:20 }}>No receipts yet. Scan your first one!</p>
                    <button onClick={() => setTab("scanner")} style={{
                      background:"rgba(255,255,255,0.09)", color:"#E2E8F0",
                      border:"1px solid rgba(255,255,255,0.13)", borderRadius:13,
                      padding:"11px 22px", fontSize:14, fontWeight:600
                    }}>Go to Scanner</button>
                  </div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {history.map(r => (
                      <div key={r.id} style={{
                        display:"flex", alignItems:"center", gap:13,
                        background:"rgba(255,255,255,0.04)", borderRadius:15,
                        padding:14, border:"1px solid rgba(255,255,255,0.06)"
                      }}>
                        {r.preview && <img src={r.preview} alt={r.vendor} style={{
                          width:52, height:52, objectFit:"cover", borderRadius:9, flexShrink:0,
                          border:"1px solid rgba(255,255,255,0.08)"
                        }}/>}
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontWeight:600, fontSize:14, marginBottom:3,
                            whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"
                          }}>{r.vendor || "Unknown Vendor"}</div>
                          <div style={{ color:"#64748B", fontSize:12, marginBottom:5 }}>
                            {r.date} · {r.category}
                          </div>
                          <div style={{ display:"flex", gap:6 }}>
                            {["📁 Drive ✓","〰️ Wave ✓"].map(lbl => (
                              <span key={lbl} style={{
                                fontSize:11, background:"rgba(16,185,129,0.1)",
                                color:"#34D399", borderRadius:10, padding:"2px 8px", fontWeight:600
                              }}>{lbl}</span>
                            ))}
                          </div>
                        </div>
                        <div style={{ fontWeight:800, fontSize:16, color:"#60A5FA", flexShrink:0 }}>
                          ${r.total}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ── FOOTER ── */}
          <div style={{
            textAlign:"center", padding:"14px 16px",
            color:"#1E3A5F", fontSize:11,
            borderTop:"1px solid rgba(255,255,255,0.04)"
          }}>
            Powered by Claude AI · Google Drive + Wave · Tax-Ready
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
